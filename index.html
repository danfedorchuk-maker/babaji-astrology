<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babaji Astrology | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --midnight: #05070a;
            --gold: #d4af37;
            --dusty-rose: #a67c7c;
            --deep-navy: #0b1026;
            --text-gold: #e2c275;
        }

        body { 
            background: var(--midnight); 
            background-image: radial-gradient(circle at center, var(--deep-navy) 0%, var(--midnight) 100%),
                              url('https://www.transparenttextures.com/patterns/stardust.png');
            color: var(--text-gold); 
            font-family: 'Inter', sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0; 
        }

        .cosmic-box { 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 40px; 
            border-radius: 4px; 
            background: rgba(11, 16, 38, 0.6); 
            backdrop-filter: blur(10px);
            max-width: 600px; 
            margin: auto; 
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }

        h1 { 
            font-family: 'Cinzel Decorative', serif;
            font-size: 2.2rem;
            letter-spacing: 8px; 
            color: var(--gold);
            margin-bottom: 5px; 
            text-transform: uppercase;
        }

        .precision-tag { 
            font-size: 0.65rem; 
            letter-spacing: 3px; 
            color: var(--dusty-rose); 
            margin-bottom: 30px; 
            display: block; 
            font-weight: bold;
        }

        .form-group { text-align: left; width: 100%; margin-bottom: 20px; }
        
        label { 
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem; 
            font-style: italic;
            color: var(--gold); 
            display: block; 
            margin-bottom: 8px; 
            opacity: 0.8;
        }

        input { 
            padding: 14px; 
            border: none;
            border-bottom: 1px solid var(--gold);
            background: transparent; 
            color: white; 
            width: 100%; 
            box-sizing: border-box; 
            font-size: 1rem;
        }

        input:focus { outline: none; border-bottom: 2px solid var(--gold); }

        button { 
            background: transparent; 
            color: var(--gold); 
            padding: 18px; 
            border: 1px solid var(--gold); 
            cursor: pointer; 
            font-family: 'Cinzel Decorative', serif;
            font-size: 1rem; 
            letter-spacing: 3px;
            width: 100%; 
            margin-top: 25px; 
            transition: all 0.4s;
        }

        button:hover { background: var(--gold); color: var(--midnight); }

        .tab-container { display: none; margin-top: 30px; animation: fadeIn 1s; }
        
        .tab-menu { 
            display: flex; 
            justify-content: center; 
            gap: 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); 
            margin-bottom: 25px; 
        }

        .tab-link { 
            padding: 10px 0; 
            font-size: 0.75rem; 
            cursor: pointer; 
            color: rgba(226, 194, 117, 0.5); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        .tab-link.active { color: var(--gold); border-bottom: 1px solid var(--gold); }
        .tab-content { display: none; text-align: left; }
        .tab-content.active { display: block; }

        #babaji-text { 
            font-family: 'Playfair Display', serif;
            font-style: italic; 
            font-size: 1.1rem;
            line-height: 1.8; 
            color: #f4f4f4; 
            padding: 20px; 
            white-space: pre-wrap;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; color: #eee; }
        th { text-align: left; color: var(--gold); font-size: 0.7rem; text-transform: uppercase; border-bottom: 1px solid #444; padding: 10px 5px; }
        td { padding: 12px 5px; border-bottom: 1px solid #222; }

        .aspect-tag { color: #a67c7c; font-size: 0.8rem; display: block; margin-bottom: 8px; font-family: 'Inter', sans-serif; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="cosmic-box">
        <h1>ASK BABAJI</h1>
        <span class="precision-tag">VINTAGE COSMOLOGY • GROUNDED INSIGHT</span>
        
        <div class="form-group"><label>Seeker's Name</label><input type="text" id="name" placeholder="Name"></div>
        <div class="form-group"><label>Date of Birth</label><input type="date" id="dob"></div>
        <div class="form-group"><label>Time of Arrival</label><input type="time" id="tob"></div>
        <div class="form-group"><label>City of Birth</label><input type="text" id="location" placeholder="City, Country"></div>
        
        <button onclick="getInsights()">CONSULT THE VAULT</button>

        <div id="results-area" class="tab-container">
            <div class="tab-menu">
                <div class="tab-link active" onclick="switchTab('narrative', this)">Narrative</div>
                <div class="tab-link" onclick="switchTab('technical', this)">Hardware</div>
                <div class="tab-link" onclick="switchTab('aspects', this)">Aspects</div>
            </div>

            <div id="narrative" class="tab-content active">
                <div id="babaji-text">Dredging the silt...</div>
            </div>

            <div id="technical" class="tab-content">
                <table>
                    <thead>
                        <tr><th>Planet</th><th>Sign</th><th>Degree</th><th>House</th></tr>
                    </thead>
                    <tbody id="chart-body"></tbody>
                </table>
            </div>

            <div id="aspects" class="tab-content">
                <div id="aspect-list" style="padding:10px;"></div>
            </div>
        </div>

        <div id="status" style="font-size:0.7rem; color:var(--dusty-rose); margin-top:25px; letter-spacing: 1px;"></div>
    </div>

    <script>
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        async function getInsights() {
            const name = document.getElementById('name').value;
            const dob = document.getElementById('dob').value;
            const tob = document.getElementById('tob').value;
            const loc = document.getElementById('location').value;
            const output = document.getElementById('babaji-text');
            const resultsArea = document.getElementById('results-area');

            if (!name || !dob || !tob || !loc) {
                alert("Babaji needs ALL coordinates.");
                return;
            }

            resultsArea.style.display = 'block';
            output.innerText = "Consulting the vault...";

            try {
                const response = await fetch('/api/babaji', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, dob, tob, loc })
                });
                const data = await response.json();
                
                if (data.reading) {
                    output.innerText = data.reading;

                    // Populate Hardware Table
                    const body = document.getElementById('chart-body');
                    body.innerHTML = "";
                    data.planets.forEach(p => {
                        body.innerHTML += `<tr><td>${p.name}</td><td>${p.sign}</td><td>${p.degree}°</td><td>${p.house}</td></tr>`;
                    });

                    // Populate Aspects
                    const aspectDiv = document.getElementById('aspect-list');
                    aspectDiv.innerHTML = "";
                    data.aspects.forEach(a => {
                        aspectDiv.innerHTML += `<span class="aspect-tag">⌬ ${a.p1} ${a.type} ${a.p2}</span>`;
                    });
                }
            } catch (e) {
                output.innerText = "The stars are obscured by hardware failure.";
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babaji Astrology | Premium</title>
    <!-- Importing Google Fonts for Elegance -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --midnight: #05070a;
            --gold: #d4af37;
            --dusty-rose: #a67c7c;
            --deep-navy: #0b1026;
            --text-gold: #e2c275;
        }

        body { 
            background: var(--midnight); 
            /* Subtle celestial grain texture */
            background-image: radial-gradient(circle at center, var(--deep-navy) 0%, var(--midnight) 100%),
                              url('https://www.transparenttextures.com/patterns/stardust.png');
            color: var(--text-gold); 
            font-family: 'Inter', sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0; 
        }

        .cosmic-box { 
            border: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 40px; 
            border-radius: 4px; /* Shifting from round to classic/sharp */
            background: rgba(11, 16, 38, 0.6); 
            backdrop-filter: blur(10px);
            max-width: 600px; 
            margin: auto; 
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }

        h1 { 
            font-family: 'Cinzel Decorative', serif;
            font-size: 2.2rem;
            letter-spacing: 8px; 
            color: var(--gold);
            margin-bottom: 5px; 
            text-transform: uppercase;
        }

        .precision-tag { 
            font-size: 0.65rem; 
            letter-spacing: 3px; 
            color: var(--dusty-rose); 
            margin-bottom: 30px; 
            display: block; 
            font-weight: bold;
        }

        .form-group { text-align: left; width: 100%; margin-bottom: 20px; }
        
        label { 
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem; 
            font-style: italic;
            color: var(--gold); 
            display: block; 
            margin-bottom: 8px; 
            opacity: 0.8;
        }

        input { 
            padding: 14px; 
            border: none;
            border-bottom: 1px solid var(--gold);
            background: transparent; 
            color: white; 
            width: 100%; 
            box-sizing: border-box; 
            font-size: 1rem;
            transition: border 0.3s;
        }

        input:focus { outline: none; border-bottom: 2px solid var(--gold); }

        button { 
            background: transparent; 
            color: var(--gold); 
            padding: 18px; 
            border: 1px solid var(--gold); 
            border-radius: 0; /* Art Deco aesthetic is often linear */
            cursor: pointer; 
            font-family: 'Cinzel Decorative', serif;
            font-size: 1rem; 
            letter-spacing: 3px;
            width: 100%; 
            margin-top: 25px; 
            transition: all 0.4s;
        }

        button:hover { background: var(--gold); color: var(--midnight); }

        /* TAB SYSTEM */
        .tab-container { display: none; margin-top: 30px; animation: fadeIn 1s; }
        
        .tab-menu { 
            display: flex; 
            justify-content: center; 
            gap: 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); 
            margin-bottom: 25px; 
        }

        .tab-link { 
            padding: 10px 0; 
            font-size: 0.75rem; 
            cursor: pointer; 
            color: rgba(226, 194, 117, 0.5); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        .tab-link.active { color: var(--gold); border-bottom: 1px solid var(--gold); }

        #babaji-text { 
            font-family: 'Playfair Display', serif;
            font-style: italic; 
            font-size: 1.1rem;
            line-height: 1.8; 
            color: #f4f4f4; 
            padding: 20px; 
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="cosmic-box">
        <h1>ASK BABAJI</h1>
        <span class="precision-tag">VINTAGE COSMOLOGY • GROUNDED INSIGHT</span>
        
        <div class="form-group"><label>Seeker's Name</label><input type="text" id="name" placeholder="E.g. Daniel"></div>
        <div class="form-group"><label>Date of Birth</label><input type="date" id="dob"></div>
        <div class="form-group"><label>Time of Arrival</label><input type="time" id="tob"></div>
        <div class="form-group"><label>City of Birth</label><input type="text" id="location" placeholder="City, Country"></div>
        
        <button onclick="getInsights()">CONSULT THE VAULT</button>

        <div id="results-area" class="tab-container">
            <div class="tab-menu">
                <div class="tab-link active" onclick="switchTab('narrative', this)">Narrative</div>
                <div class="tab-link" onclick="switchTab('technical', this)">Hardware</div>
            </div>

            <div id="narrative" class="tab-content active">
                <div id="babaji-text">Waiting for the stars to align...</div>
            </div>
            
            <div id="technical" class="tab-content">
                <!-- Data tables here as before -->
            </div>
        </div>

        <div id="status" style="font-size:0.7rem; color:var(--dusty-rose); margin-top:25px; letter-spacing: 1px;"></div>
    </div>

    <script>
        // CORE FIX: Integration for Audio Output
        async function playOldManVoice(text) {
            // Replace with your ElevenLabs API Key or local Android Intent
            console.log("Synthesizing voice for: ", text);
            
            /* 
            Note: To use the "Old Man" voice, you would send this 'text' 
            to your backend/API which returns the audio file.
            */
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.rate = 0.8;  // Slower for an aged feel
            msg.pitch = 0.7; // Deeper for an authoritative feel
            window.speechSynthesis.speak(msg);
        }

        async function getInsights() {
            const output = document.getElementById('babaji-text');
            const resultsArea = document.getElementById('results-area');
            
            // Validation and fetching logic...
            resultsArea.style.display = 'block';
            output.innerText = "Consulting the vault...";

            // Simulation of API response for demonstration
            setTimeout(() => {
                const resultText = "The stars show a strong alignment in your house of hardware. You possess the focus of a true philologist.";
                output.innerText = resultText;
                playOldManVoice(resultText); // Trigger the audio
            }, 2000);
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>

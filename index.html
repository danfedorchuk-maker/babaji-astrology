<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babaji Astrology | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --midnight: #05070a;
            --gold: #d4af37;
            --dusty-rose: #a67c7c;
            --deep-navy: #0b1026;
            --text-gold: #e2c275;
        }

        body { 
            background: var(--midnight); 
            /* FIXED: Noise texture and starfield depth for atmospheric depth */
            background-image: 
                radial-gradient(circle at center, var(--deep-navy) 0%, var(--midnight) 100%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
            color: var(--text-gold); 
            font-family: 'Inter', sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0; 
        }

        .cosmic-box { 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 40px; 
            background: rgba(11, 16, 38, 0.7); 
            backdrop-filter: blur(12px);
            max-width: 600px; 
            margin: auto; 
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
        }

        h1 { font-family: 'Cinzel Decorative', serif; letter-spacing: 8px; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; }
        .precision-tag { font-size: 0.65rem; letter-spacing: 3px; color: var(--dusty-rose); margin-bottom: 30px; display: block; }

        /* UNIFIED TYPOGRAPHY: Form Labels and Table Headers matched */
        label, th { 
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem; 
            font-style: italic;
            color: var(--gold); 
            opacity: 0.9;
        }

        input { 
            padding: 14px; border: none; border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            background: transparent; color: white; width: 100%; box-sizing: border-box; margin-bottom: 20px;
        }

        button { 
            background: transparent; color: var(--gold); padding: 18px; border: 1px solid var(--gold); 
            cursor: pointer; font-family: 'Cinzel Decorative', serif; width: 100%; margin: 25px 0;
        }

        /* FIXED: Transition divider between form and results */
        .divider { border-top: 1px solid rgba(212, 175, 55, 0.1); margin: 30px 0; }

        .tab-menu { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .tab-link { font-size: 0.75rem; cursor: pointer; color: rgba(226, 194, 117, 0.4); text-transform: uppercase; letter-spacing: 2px; padding-bottom: 5px; }
        .tab-link.active { color: var(--gold); border-bottom: 1px solid var(--gold); }
        .tab-content { display: none; text-align: left; animation: fadeIn 1s; }
        .tab-content.active { display: block; }

        #babaji-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.15rem; line-height: 1.8; color: #eee; padding: 10px; }

        /* REFINED TABLE: Clunky blue highlights removed */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 10px 5px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        td { padding: 12px 5px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); color: #ddd; font-size: 0.9rem; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="cosmic-box">
        <h1>ASK BABAJI</h1>
        <span class="precision-tag">VINTAGE COSMOLOGY • GROUNDED INSIGHT</span>
        
        <input type="text" id="name" placeholder="Seeker's Name">
        <input type="date" id="dob">
        <input type="time" id="tob">
        <input type="text" id="location" placeholder="City of Birth">
        
        <button onclick="getInsights()">CONSULT THE VAULT</button>

        <div class="divider"></div>

        <div id="results-area" style="display:none;">
            <div class="tab-menu">
                <div class="tab-link active" onclick="switchTab('narrative', this)">Narrative</div>
                <div class="tab-link" onclick="switchTab('technical', this)">Hardware</div>
                <div class="tab-link" onclick="switchTab('aspects', this)">Aspects</div>
            </div>

            <div id="narrative" class="tab-content active"><div id="babaji-text"></div></div>
            <div id="technical" class="tab-content">
                <table>
                    <thead><tr><th>Planet</th><th>Sign</th><th>Degree</th><th>House</th></tr></thead>
                    <tbody id="chart-body"></tbody>
                </table>
            </div>
            <div id="aspects" class="tab-content"><div id="aspect-list"></div></div>
        </div>
    </div>

    <script>
        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        async function getInsights() {
            const output = document.getElementById('babaji-text');
            document.getElementById('results-area').style.display = 'block';
            output.innerText = "Dredging the silt...";

            const payload = {
                name: document.getElementById('name').value,
                dob: document.getElementById('dob').value,
                tob: document.getElementById('tob').value,
                loc: document.getElementById('location').value
            };

            try {
                const res = await fetch('/api/babaji', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                // Narrative Magic output population
                output.innerText = data.reading;

                // Hardware Table population
                const body = document.getElementById('chart-body');
                body.innerHTML = data.planets.map(p => 
                    `<tr><td>${p.name}</td><td>${p.sign}</td><td>${p.normDegree}°</td><td>${p.house}</td></tr>`
                ).join('');

                // Aspects population
                document.getElementById('aspect-list').innerHTML = data.aspects.map(a => 
                    `<div style="font-size:0.85rem; margin-bottom:8px; opacity:0.7;">⌬ ${a.p1} ${a.type} ${a.p2}</div>`
                ).join('');
            } catch (e) {
                output.innerText = "The stars are obscured.";
            }
        }
    </script>
</body>
</html>

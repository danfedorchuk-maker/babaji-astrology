<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babaji Astrology</title>
    <style>
        body { background: #0b0b1a; color: #d4af37; font-family: 'Courier New', Courier, monospace; text-align: center; padding: 20px; margin: 0; }
        .cosmic-box { border: 2px solid #d4af37; padding: 20px; border-radius: 15px; background: rgba(255,255,255,0.05); max-width: 500px; margin: auto; }
        h1 { letter-spacing: 5px; text-shadow: 0 0 10px #d4af37; margin-bottom: 2px; }
        .precision-tag { font-size: 0.7rem; letter-spacing: 2px; color: #888; margin-bottom: 20px; display: block; }
        
        /* THE INPUT LABELS */
        .form-group { text-align: left; width: 90%; margin: auto; margin-bottom: 15px; }
        label { font-size: 0.75rem; text-transform: uppercase; color: #d4af37; display: block; margin-bottom: 5px; margin-left: 2px; }
        
        input { padding: 12px; border-radius: 5px; border: 1px solid #d4af37; background: #1a1a2e; color: white; width: 100%; font-size: 1rem; box-sizing: border-box; }
        
        button { background: #4b0082; color: white; padding: 15px; border: none; border-radius: 50px; cursor: pointer; font-size: 1.1rem; width: 95%; margin-top: 15px; box-shadow: 0 0 15px #6a0dad; }
        .btn-print { background: #2e8b57; margin-top: 10px; font-size: 0.9rem; }
        
        #babaji-text { margin-top: 25px; font-style: italic; min-height: 80px; line-height: 1.6; color: #eee; padding: 10px; border-top: 1px dashed #444; white-space: pre-wrap; }
        .limit-text { font-size: 0.8rem; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="cosmic-box">
        <h1>ASK BABAJI</h1>
        <span class="precision-tag">ACCURATE HOUSE CALCULATIONS</span>
        
        <div class="form-group">
            <label>Seeker's Name</label>
            <input type="text" id="name" placeholder="Name">
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="dob">
        </div>

        <div class="form-group">
            <label>Time of Birth (CRUCIAL)</label>
            <input type="time" id="tob">
        </div>

        <div class="form-group">
            <label>City of Birth</label>
            <input type="text" id="location" placeholder="City, Country">
        </div>
        
        <button onclick="getInsights()">Seek Cosmic Creaminess</button>
        <button onclick="printInsight()" class="btn-print">Print for Contemplation</button>

        <div id="babaji-text">Babaji is waiting for your specific arrival time...</div>
        <div id="status" class="limit-text"></div>
    </div>

    <script>
        let queryCount = parseInt(localStorage.getItem('babaji_limit')) || 0;
        updateStatus();

        function updateStatus() {
            const s = document.getElementById('status');
            if (queryCount >= 3) {
                s.innerHTML = "<b style='color:#ff4444;'>FREE ACCESS DEPLETED.</b>";
            } else {
                s.innerText = "Insights used: " + queryCount + " of 3";
            }
        }

        async function getInsights() {
            const name = document.getElementById('name').value;
            const dob = document.getElementById('dob').value;
            const tob = document.getElementById('tob').value;
            const loc = document.getElementById('location').value;
            const output = document.getElementById('babaji-text');

            if (queryCount >= 3) {
                output.innerHTML = "Babaji's third eye is closed to you for free, " + name + ".<br><br><span style='color: #00ff00; font-size: 1.2rem;'>Donate $3.00 to see deeper.</span>";
                return;
            }

            // ENFORCING TIME ENTRY
            if (!name || !dob || !tob || !loc) {
                alert("Babaji needs the TIME. Without the clock, there are no houses.");
                return;
            }

            output.innerText = "Dredging the silt of your specific arrival...";

            try {
                const response = await fetch('/api/babaji', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, dob, tob, loc })
                });
                const data = await response.json();
                
                if (data.reading) {
                    output.innerText = data.reading;
                    queryCount++;
                    localStorage.setItem('babaji_limit', queryCount);
                    updateStatus();
                } else {
                    output.innerText = "The stars are cloudy. Check the coordinates.";
                }
            } catch (e) {
                output.innerText = "Connection severed. The celestial bridge is down.";
            }
        }

        function printInsight() {
           function printInsight() {
    const insight = document.getElementById('babaji-text').innerText;
    if (insight.includes("waiting") || insight === "") {
        alert("Babaji has not spoken yet. You cannot print silence.");
        return;
    }

    // This creates a print-only style on the fly
    const style = document.createElement('style');
    style.innerHTML = `
        @media print {
            body * { visibility: hidden; }
            #babaji-text, #babaji-text * { visibility: visible; color: black !important; }
            #babaji-text { 
                position: absolute; 
                left: 0; top: 0; 
                width: 100%; 
                padding: 40px;
                border: 5px double #d4af37;
                font-family: 'Times New Roman', serif;
                font-size: 1.2rem;
                text-align: center;
            }
            #babaji-text::before {
                content: "BABAJI'S COSMIC INSIGHT";
                display: block;
                font-weight: bold;
                font-size: 2rem;
                margin-bottom: 20px;
                border-bottom: 2px solid #000;
            }
        }
    `;
    document.head.appendChild(style);
    window.print();
    document.head.removeChild(style); // Clean up after
}
            printWindow.document.close();
        }
    </script>
</body>
</html>

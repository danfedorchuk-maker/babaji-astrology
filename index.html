<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babaji Astrology</title>
    <style>
        body { background: #0b0b1a; color: #d4af37; font-family: 'Courier New', Courier, monospace; text-align: center; padding: 20px; margin: 0; }
        .cosmic-box { border: 2px solid #d4af37; padding: 20px; border-radius: 15px; background: rgba(255,255,255,0.05); max-width: 500px; margin: auto; }
        h1 { letter-spacing: 5px; text-shadow: 0 0 10px #d4af37; }
        input { padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #d4af37; background: #1a1a2e; color: white; width: 90%; font-size: 1rem; }
        button { background: #4b0082; color: white; padding: 15px; border: none; border-radius: 50px; cursor: pointer; font-size: 1.1rem; width: 95%; margin-top: 15px; box-shadow: 0 0 15px #6a0dad; }
        #babaji-text { margin-top: 25px; font-style: italic; min-height: 60px; line-height: 1.5; color: #eee; }
        .limit-text { font-size: 0.8rem; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="cosmic-box">
        <h1>ASK BABAJI</h1>
        <p>The stars do not give credit. Enter your details.</p>
        
        <input type="text" id="name" placeholder="Client Name">
        <input type="date" id="dob" title="Date of Birth">
        <input type="time" id="tob" title="Time of Birth">
        <input type="text" id="location" placeholder="City of Birth">
        
        <button onclick="getInsights()">Seek Cosmic Creaminess</button>
        <button onclick="getInsights()">Seek Cosmic Creaminess</button>
<button onclick="printInsight()" style="background: #2e8b57; margin-top: 10px;">Print for Contemplation</button>
<button onclick="printInsight()" style="background: #2e8b57; margin-top: 10px;">Print for Contemplation</button>
        <div id="babaji-text">Babaji is closing his eyes, waiting for the stars to speak...</div>
        <div id="status" class="limit-text"></div>
    </div>

    <script>
        // 1. PERSISTENT MEMORY: This stays even if they close/reload the app
        let queryCount = parseInt(localStorage.getItem('babaji_limit')) || 0;

        // Show the status immediately on load
        updateStatus();

        function updateStatus() {
            const s = document.getElementById('status');
            if (queryCount >= 3) {
                s.innerHTML = "<b style='color:#ff4444;'>FREE ACCESS EXPIRED.</b>";
            } else {
                s.innerText = "Free insights used: " + queryCount + " of 3";
            }
        }

        async function getInsights() {
            const name = document.getElementById('name').value;
            const dob = document.getElementById('dob').value;
            const loc = document.getElementById('location').value;
            const output = document.getElementById('babaji-text');

            // 2. THE MERCHANT LOCK: Hard cutoff
            if (queryCount >= 3) {
                output.innerHTML = "Babaji has seen enough of your future for free, " + name + ".<br><br>" +
                                 "<span style='color: #00ff00; font-size: 1.3rem;'>Donate $3.00 to open the Third Eye.</span>";
                return;
            }

            if (!name || !dob) {
                alert("Babaji cannot find a nameless soul. Fill the boxes!");
                return;
            }

            // 3. THE "CALCULATION" ANIMATION
            output.innerText = "Vibrating the cosmic strings for " + name + "...";
            
            setTimeout(() => {
                // INCREMENT AND SAVE
                queryCount++;
                localStorage.setItem('babaji_limit', queryCount);
                updateStatus();
                
                // FINAL RESPONSE
            }, 2000);
    } // This bracket MUST end getInsights

    // This is the separate Print function
    function printInsight() {
        const name = document.getElementById('name').value || "Seeker";
        const insight = document.getElementById('babaji-text').innerText;
        
        const printWindow = window.open('', '_blank');
        printWindow.document.write(`
            <html>
                <head>
                    <title>Babaji's Cosmic Insight</title>
                    <style>
                        body { font-family: 'Times New Roman', serif; padding: 50px; text-align: center; border: 10px double #d4af37; color: #000; background: #fff; }
                        h1 { color: #4b0082; border-bottom: 2px solid #d4af37; padding-bottom: 10px; }
                        .content { font-size: 1.4rem; margin-top: 30px; line-height: 1.6; font-style: italic; }
                        .footer { margin-top: 50px; font-size: 0.9rem; color: #666; border-top: 1px solid #eee; padding-top: 20px; }
                    </style>
                </head>
                <body>
                    <h1>A Celestial Message for ${name}</h1>
                    <div class="content">"${insight}"</div>
                    <div class="footer">Documented via Babaji Astrology. <br> The stars do not lie, they only illuminate.</div>
                    <script>window.print();<\/script>
                </body>
            </html>
        `);
        printWindow.document.close();
    }
</script>
</body>
</html>

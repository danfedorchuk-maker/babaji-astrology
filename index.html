<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babaji Astrology | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        :root { --midnight:#05070a; --gold:#d4af37; --rose:#a67c7c; --navy:#0b1026; --tgold:#e2c275; }
        *{box-sizing:border-box;}
        body{background:var(--midnight);background-image:radial-gradient(circle at center,var(--navy) 0%,var(--midnight) 100%);color:var(--tgold);font-family:'Inter',sans-serif;text-align:center;padding:40px 20px;margin:0;}
        .box{border:1px solid rgba(212,175,55,.2);padding:40px;background:rgba(11,16,38,.7);backdrop-filter:blur(12px);max-width:600px;margin:auto;box-shadow:0 10px 50px rgba(0,0,0,.9);}
        h1{font-family:'Cinzel Decorative',serif;letter-spacing:8px;color:var(--gold);text-transform:uppercase;margin-bottom:5px;font-size:clamp(1.1rem,4vw,1.8rem);}
        .tag{font-size:.65rem;letter-spacing:3px;color:var(--rose);margin-bottom:30px;display:block;}
        .lbl{font-size:.7rem;letter-spacing:2px;color:var(--rose);display:block;text-align:left;margin-bottom:8px;}
        input,select{padding:14px;border:none;border-bottom:1px solid rgba(212,175,55,.3);background:transparent;color:white;width:100%;margin-bottom:20px;font-family:'Inter',sans-serif;font-size:.9rem;-webkit-appearance:none;appearance:none;}
        select option{background:#0b1026;}
        input::placeholder{color:rgba(255,255,255,.3);}
        .row{display:flex;gap:10px;margin-bottom:20px;}
        .row select{margin-bottom:0;flex:1;}
        button{background:transparent;color:var(--gold);padding:18px;border:1px solid var(--gold);cursor:pointer;font-family:'Cinzel Decorative',serif;width:100%;margin:25px 0;font-size:.7rem;letter-spacing:2px;transition:background .3s;}
        button:hover{background:rgba(212,175,55,.08);}
        .seg{display:flex;gap:8px;margin-bottom:20px;}
        .seg button{flex:1;margin:0;padding:11px 4px;font-size:.55rem;color:rgba(226,194,117,.4);border-color:rgba(212,175,55,.2);}
        .seg button.active{color:var(--gold);border-color:var(--gold);background:rgba(212,175,55,.05);}
        .divider{border-top:1px solid rgba(212,175,55,.1);margin:30px 0;}
        .tabs{display:flex;justify-content:center;gap:20px;margin-bottom:25px;}
        .tab{font-size:.75rem;cursor:pointer;color:rgba(226,194,117,.4);text-transform:uppercase;letter-spacing:2px;padding-bottom:5px;}
        .tab.active{color:var(--gold);border-bottom:1px solid var(--gold);}
        .pane{display:none;text-align:left;animation:fadeIn 1s;}
        .pane.active{display:block;}
        #babaji-text{font-family:'Playfair Display',serif;font-style:italic;font-size:1.1rem;line-height:1.9;color:#eee;padding:10px;}
        table{width:100%;border-collapse:collapse;margin-top:10px;}
        th{font-family:'Playfair Display',serif;font-style:italic;font-size:.85rem;color:var(--gold);text-align:left;padding:10px 5px;border-bottom:1px solid rgba(212,175,55,.2);}
        td{padding:12px 5px;border-bottom:1px solid rgba(255,255,255,.05);color:#ddd;font-size:.9rem;}
        .angle-row td{color:var(--tgold);font-style:italic;}
        .section-header td{font-size:.6rem;letter-spacing:2px;color:var(--rose);padding-top:18px;padding-bottom:4px;border-bottom:1px solid rgba(212,175,55,.1);}
        .audio-box{margin-top:20px;padding:16px;border:1px solid rgba(212,175,55,.15);background:rgba(11,16,38,.5);}
        #audio-player{width:100%;margin-top:8px;}
        .lang-pill{font-size:.6rem;letter-spacing:2px;color:rgba(166,124,124,.6);text-align:left;display:block;margin-bottom:16px;}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    </style>
</head>
<body>
<div class="box">
    <h1>ASK BABAJI</h1>
    <span class="tag">VINTAGE COSMOLOGY • GROUNDED INSIGHT</span>

    <span class="lbl">CHOOSE YOUR TRADITION</span>
    <div class="seg" id="trad-seg">
        <button class="active" onclick="pick(this,'trad','western')">WESTERN</button>
        <button onclick="pick(this,'trad','indian')">INDIAN</button>
        <button onclick="pick(this,'trad','chinese')">CHINESE</button>
    </div>

    <div id="house-sys-wrap">
        <span class="lbl">HOUSE SYSTEM</span>
        <div class="seg" id="house-seg">
            <button class="active" onclick="pick(this,'house','placidus')">PLACIDUS</button>
            <button onclick="pick(this,'house','topocentric')">TOPOCENTRIC</button>
        </div>
    </div>

    <span class="lbl">LANGUAGE OVERRIDE</span>
    <div class="seg" id="lang-seg">
        <button onclick="pick(this,'lang','en')">EN</button>
        <button onclick="pick(this,'lang','ru')">РУС</button>
        <button onclick="pick(this,'lang','hi')">हिं</button>
        <button onclick="pick(this,'lang','zh-TW')">中文</button>
        <button onclick="pick(this,'lang',null)">AUTO</button>
    </div>
    <span class="lang-pill" id="lang-pill"></span>

    <input type="text" id="name" placeholder="Seeker's Name">

    <span class="lbl">DATE OF BIRTH</span>
    <div class="row">
        <select id="mon"></select>
        <select id="day"></select>
        <select id="yr"></select>
    </div>

    <span class="lbl">TIME OF ARRIVAL</span>
    <div class="row">
        <select id="hr"></select>
        <select id="mn"></select>
    </div>

    <input type="text" id="loc" placeholder="City of Birth">

    <button onclick="getInsights()">SEEK COSMIC CREAMINESS</button>
    <div class="divider"></div>

    <div id="results" style="display:none">
        <div class="audio-box">
            <span class="lbl">BABAJI SPEAKS</span>
            <audio id="audio-player" controls></audio>
        </div>
        <div class="tabs" style="margin-top:24px">
            <div class="tab active" onclick="switchTab('narr',this)">Narrative</div>
            <div class="tab" onclick="switchTab('hw',this)">Hardware</div>
            <div class="tab" onclick="switchTab('asp',this)">Aspects</div>
        </div>
        <div id="narr" class="pane active"><div id="babaji-text"></div></div>
        <div id="hw" class="pane">
            <table>
                <thead>
                    <tr>
                        <th>Planet / Angle</th>
                        <th>Sign</th>
                        <th>Degree</th>
                        <th>House</th>
                    </tr>
                </thead>
                <tbody id="planet-body"></tbody>
            </table>
            <div id="house-system-label" style="font-size:.6rem;letter-spacing:2px;color:rgba(166,124,124,.5);text-align:right;margin-top:12px;"></div>
        </div>
        <div id="asp" class="pane"><div id="aspect-list"></div></div>
    </div>
</div>

<script>
    const state = { trad: 'western', lang: null, house: 'placidus' };
    const browserLang = navigator.language || 'en';
    let blobUrl = null;

    updatePill();

    function pick(el, key, val) {
        const segId = key === 'trad' ? 'trad-seg' : key === 'house' ? 'house-seg' : 'lang-seg';
        document.querySelectorAll(`#${segId} button`).forEach(b => b.classList.remove('active'));
        state[key] = val;
        if (val !== null) el.classList.add('active');
        updatePill();
        if (key === 'trad') {
            document.getElementById('house-sys-wrap').style.display = val === 'western' ? 'block' : 'none';
        }
    }

    function updatePill() {
        document.getElementById('lang-pill').textContent = 'LANGUAGE: ' + (state.lang || browserLang).toUpperCase();
    }

    function switchTab(id, el) {
        document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const mon = document.getElementById('mon');
    mon.innerHTML = '<option value="">Month</option>' + months.map((m,i)=>`<option value="${String(i+1).padStart(2,'0')}">${m}</option>`).join('');
    const day = document.getElementById('day');
    day.innerHTML = '<option value="">Day</option>' + [...Array(31)].map((_,i)=>`<option value="${String(i+1).padStart(2,'0')}">${i+1}</option>`).join('');
    const yr = document.getElementById('yr');
    yr.innerHTML = '<option value="">Year</option>' + [...Array(111)].map((_,i)=>`<option value="${2010-i}">${2010-i}</option>`).join('');
    const hr = document.getElementById('hr');
    hr.innerHTML = '<option value="">Hour</option>' + [...Array(24)].map((_,i)=>`<option value="${String(i).padStart(2,'0')}">${String(i).padStart(2,'0')}:00</option>`).join('');
    const mn = document.getElementById('mn');
    mn.innerHTML = '<option value="">Min</option>' + [...Array(12)].map((_,i)=>`<option value="${String(i*5).padStart(2,'0')}">${String(i*5).padStart(2,'0')}</option>`).join('');

    const ZODIAC_SIGNS = ['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'];
    function norm(deg) { return ((deg % 360) + 360) % 360; }
    function toLonSign(lon) { const n = norm(lon); return { sign: ZODIAC_SIGNS[Math.floor(n/30)], normDegree: n % 30 }; }

    function julianDay(year, month, day, hour) {
        if (month <= 2) { year -= 1; month += 12; }
        const A = Math.floor(year/100);
        const B = 2 - A + Math.floor(A/4);
        return Math.floor(365.25*(year+4716)) + Math.floor(30.6001*(month+1)) + day + hour/24 + B - 1524.5;
    }

    function gmst(jd) {
        const T = (jd - 2451545.0) / 36525;
        return norm(280.46061837 + 360.98564736629*(jd-2451545) + T*T*0.000387933 - T*T*T/38710000);
    }

    function lst(jd, lonDeg) { return norm(gmst(jd) + lonDeg); }

    function obliquity(jd) {
        const T = (jd - 2451545.0) / 36525;
        return 23.439291111 - 0.013004167*T - 0.0000001639*T*T + 0.0000005036*T*T*T;
    }

    function calcAscendant(ramc, eps, lat) {
        const R = x => x*Math.PI/180, D = x => x*180/Math.PI;
        const r=R(ramc), e=R(eps), l=R(lat);
        let asc = D(Math.atan2(-Math.cos(r), Math.sin(e)*Math.tan(l)+Math.cos(e)*Math.sin(r)));
        if (asc < 0) asc += 180;
        if (Math.cos(r) > 0) asc += 180;
        return norm(asc);
    }

    function calcMC(ramc, eps) {
        const R = x => x*Math.PI/180, D = x => x*180/Math.PI;
        let mc = D(Math.atan(Math.tan(R(ramc)) / Math.cos(R(eps))));
        if (ramc > 90 && ramc < 270) mc += 180;
        return norm(mc);
    }

    function placidusHouses(ramc, eps, lat) {
        const R = x => x*Math.PI/180, D = x => x*180/Math.PI;
        const e=R(eps), l=R(lat);
        const mc=calcMC(ramc,eps), asc=calcAscendant(ramc,eps,lat), ic=norm(mc+180), dsc=norm(asc+180);

        function placidusIntermediate(houseNum) {
            let offset, base;
            if (houseNum===11){offset=1/3;base=ramc;}
            else if(houseNum===12){offset=2/3;base=ramc;}
            else if(houseNum===2){offset=1/3;base=norm(ramc+180);}
            else if(houseNum===3){offset=2/3;base=norm(ramc+180);}
            else return null;
            const theta=R(norm(base+offset*90));
            const dec=Math.asin(Math.sin(e)*Math.sin(theta));
            const md_upper=Math.acos(-Math.tan(l)*Math.tan(dec));
            const md_lower=Math.PI-md_upper;
            let ra_cusp;
            if(houseNum===11) ra_cusp=base+D(md_upper)/3;
            else if(houseNum===12) ra_cusp=base+2*D(md_upper)/3;
            else if(houseNum===2) ra_cusp=norm(ramc+180)+D(md_lower)/3;
            else if(houseNum===3) ra_cusp=norm(ramc+180)+2*D(md_lower)/3;
            ra_cusp=R(norm(ra_cusp));
            const sinLon=(Math.cos(e)*Math.sin(ra_cusp)+Math.tan(dec)*Math.sin(e));
            return norm(D(Math.atan2(sinLon,Math.cos(ra_cusp))));
        }

        return {
            cusps:[asc,placidusIntermediate(2),placidusIntermediate(3),ic,
                norm(ic+placidusIntermediate(3)-placidusIntermediate(2)),
                norm(dsc-(asc-placidusIntermediate(12))),
                dsc,norm(dsc+(placidusIntermediate(2)-asc)),norm(dsc+(placidusIntermediate(3)-asc)),
                mc,placidusIntermediate(11),placidusIntermediate(12)],
            asc,mc,ic,dsc
        };
    }

    function topocentricHouses(ramc, eps, lat) {
        const R = x => x*Math.PI/180, D = x => x*180/Math.PI;
        const e=R(eps), l=R(lat);
        const mc=calcMC(ramc,eps), asc=calcAscendant(ramc,eps,lat), ic=norm(mc+180), dsc=norm(asc+180);

        function topoIntermediate(houseNum) {
            let f, base;
            if(houseNum===11){f=1/3;base=ramc;}
            else if(houseNum===12){f=2/3;base=ramc;}
            else if(houseNum===2){f=1/3;base=norm(ramc+180);}
            else if(houseNum===3){f=2/3;base=norm(ramc+180);}
            else return null;
            const pole=Math.atan(f*Math.tan(l));
            const theta=R(norm(base+f*90));
            const dec=Math.asin(Math.sin(e)*Math.sin(theta));
            const md=Math.acos(-Math.tan(pole)*Math.tan(dec));
            let ra_cusp=(houseNum===11||houseNum===12) ? ramc+D(md)*f*3 : norm(ramc+180)+D(md)*f*3;
            ra_cusp=R(norm(ra_cusp));
            const sinLon=(Math.cos(e)*Math.sin(ra_cusp)+Math.tan(dec)*Math.sin(e));
            return norm(D(Math.atan2(sinLon,Math.cos(ra_cusp))));
        }

        const h2=topoIntermediate(2),h3=topoIntermediate(3),h11=topoIntermediate(11),h12=topoIntermediate(12);
        return {
            cusps:[asc,h2,h3,ic,norm(ic+(h3-asc)),norm(ic+(h12-asc)*2),
                dsc,norm(dsc+(h2-asc)),norm(dsc+(h3-asc)),mc,h11,h12],
            asc,mc,ic,dsc
        };
    }

    function whichHouse(planetLon, cusps) {
        for (let i=0;i<12;i++) {
            const start=cusps[i], end=cusps[(i+1)%12];
            if (start<=end){ if(planetLon>=start&&planetLon<end) return i+1; }
            else { if(planetLon>=start||planetLon<end) return i+1; }
        }
        return 1;
    }

    async function getInsights() {
        const out = document.getElementById('babaji-text');
        const player = document.getElementById('audio-player');
        document.getElementById('results').style.display = 'block';
        out.innerText = 'Dredging the silt…';
        if (blobUrl) { URL.revokeObjectURL(blobUrl); blobUrl=null; player.src=''; }

        const dobYear=parseInt(document.getElementById('yr').value)||1990;
        const dobMonth=parseInt(document.getElementById('mon').value)||1;
        const dobDay=parseInt(document.getElementById('day').value)||1;
        const tobHour=parseInt(document.getElementById('hr').value)||12;
        const tobMin=parseInt(document.getElementById('mn').value)||0;
        const locStr=document.getElementById('loc').value||'London';

        const cityCoords = {
            'london':[51.51,-0.13],'new york':[40.71,-74.01],'paris':[48.85,2.35],
            'tokyo':[35.68,139.69],'mumbai':[19.08,72.88],'sydney':[-33.87,151.21],
            'moscow':[55.76,37.62],'berlin':[52.52,13.40],'los angeles':[34.05,-118.24],
            'chicago':[41.88,-87.63],'toronto':[43.65,-79.38],'dubai':[25.20,55.27],
            'singapore':[1.35,103.82],'taipei':[25.05,121.53],'delhi':[28.61,77.21],
            'beijing':[39.91,116.39],'shanghai':[31.23,121.47],'seoul':[37.57,126.98],
            'bangkok':[13.75,100.52],'cairo':[30.05,31.25],'lagos':[6.45,3.40],
            'sao paulo':[-23.55,-46.63],'mexico city':[19.43,-99.13],'buenos aires':[-34.61,-58.38]
        };
        let lat=51.5, lon=-0.1;
        const key=locStr.toLowerCase().trim();
        for (const [city,coords] of Object.entries(cityCoords)) {
            if(key.includes(city)||city.includes(key)){[lat,lon]=coords;break;}
        }

        const jd=julianDay(dobYear,dobMonth,dobDay,tobHour+tobMin/60-lon/15);
        const eps=obliquity(jd);
        const ramc=lst(jd,lon);

        const houses = state.house==='topocentric' ? topocentricHouses(ramc,eps,lat) : placidusHouses(ramc,eps,lat);

        const angles = [
            {name:'ASC',label:'Ascendant',lon:houses.asc},
            {name:'MC', label:'Midheaven',lon:houses.mc},
            {name:'IC', label:'Imum Coeli',lon:houses.ic},
            {name:'DSC',label:'Descendant',lon:houses.dsc},
        ].map(a=>({...a,...toLonSign(a.lon)}));

        try {
            const res = await fetch('/api/babaji', {
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('name').value,
                    dob: `${document.getElementById('yr').value}-${document.getElementById('mon').value}-${document.getElementById('day').value}`,
                    tob: `${document.getElementById('hr').value}:${document.getElementById('mn').value}`,
                    loc: locStr,
                    tradition: state.trad,
                    lang: state.lang||browserLang,
                    houseSystem: state.house,
                    angles: angles.map(a=>({name:a.name,label:a.label,sign:a.sign,degree:parseFloat(a.normDegree).toFixed(2)}))
                })
            });
            const data = await res.json();
            out.innerText = data.reading;

            if (data.audio) {
                const bytes=atob(data.audio);
                const buf=new Uint8Array(bytes.length);
                for(let i=0;i<bytes.length;i++) buf[i]=bytes.charCodeAt(i);
                blobUrl=URL.createObjectURL(new Blob([buf],{type:'audio/mpeg'}));
                player.src=blobUrl; player.load(); player.play().catch(()=>{});
            }

            let rows='';
            rows+=`<tr class="section-header"><td colspan="4">— ANGLES —</td></tr>`;
            angles.forEach(a=>{
                rows+=`<tr class="angle-row">
                    <td>${a.name} <span style="font-size:.65rem;opacity:.5">${a.label}</span></td>
                    <td>${a.sign}</td>
                    <td>${parseFloat(a.normDegree).toFixed(2)}°</td>
                    <td>${a.name==='ASC'?1:a.name==='MC'?10:a.name==='IC'?4:7}</td>
                </tr>`;
            });
            rows+=`<tr class="section-header"><td colspan="4">— PLANETS —</td></tr>`;
            (data.planets||[]).forEach(p=>{
                const planetLon=p.longitude!==undefined?parseFloat(p.longitude):null;
                const house=planetLon!==null?whichHouse(planetLon,houses.cusps):p.house;
                rows+=`<tr>
                    <td>${p.name}</td><td>${p.sign}</td>
                    <td>${parseFloat(p.normDegree).toFixed(2)}°</td>
                    <td>${house}</td>
                </tr>`;
            });
            document.getElementById('planet-body').innerHTML=rows;
            document.getElementById('house-system-label').textContent=
                (state.house==='topocentric'?'TOPOCENTRIC':'PLACIDUS')+' HOUSE SYSTEM';

            document.getElementById('aspect-list').innerHTML=(data.aspects?.length)
                ? data.aspects.map(a=>`<div style="font-size:.85rem;margin-bottom:8px;opacity:.7">⌬ ${a.p1} ${a.type} ${a.p2}</div>`).join('')
                : '<div style="font-size:.85rem;opacity:.4;padding:10px">Aspect calculations arriving in a future celestial update.</div>';

        } catch(e) {
            out.innerText='The stars are obscured. ('+e.message+')';
        }
    }
</script>
</body>

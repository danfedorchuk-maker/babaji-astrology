<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babaji Astrology | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        :root {
            --midnight: #05070a;
            --gold: #d4af37;
            --dusty-rose: #a67c7c;
            --deep-navy: #0b1026;
            --text-gold: #e2c275;
        }
        body { 
            background: var(--midnight); 
            background-image: 
                radial-gradient(circle at center, var(--deep-navy) 0%, var(--midnight) 100%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
            color: var(--text-gold); 
            font-family: 'Inter', sans-serif; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0; 
        }
        .cosmic-box { 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            padding: 40px; 
            background: rgba(11, 16, 38, 0.7); 
            backdrop-filter: blur(12px);
            max-width: 600px; 
            margin: auto; 
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
        }
        h1 { font-family: 'Cinzel Decorative', serif; letter-spacing: 8px; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; }
        .precision-tag { font-size: 0.65rem; letter-spacing: 3px; color: var(--dusty-rose); margin-bottom: 30px; display: block; }
        label, th { 
            font-family: 'Playfair Display', serif;
            font-size: 0.85rem; 
            font-style: italic;
            color: var(--gold); 
            opacity: 0.9;
        }
        input, select { 
            padding: 14px; border: none; border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            background: transparent; color: white; width: 100%; box-sizing: border-box; margin-bottom: 20px;
        }
        select option { background: #0b1026; }
        button { 
            background: transparent; color: var(--gold); padding: 18px; border: 1px solid var(--gold); 
            cursor: pointer; font-family: 'Cinzel Decorative', serif; width: 100%; margin: 25px 0;
        }
        .tradition-btn { 
    width: auto; margin: 0; padding: 12px; font-size: 0.6rem; 
    color: rgba(226,194,117,0.4); border-color: rgba(212,175,55,0.2);
}
.tradition-btn.active { color: var(--gold); border-color: var(--gold); }
        .divider { border-top: 1px solid rgba(212, 175, 55, 0.1); margin: 30px 0; }
        .tab-menu { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .tab-link { font-size: 0.75rem; cursor: pointer; color: rgba(226, 194, 117, 0.4); text-transform: uppercase; letter-spacing: 2px; padding-bottom: 5px; }
        .tab-link.active { color: var(--gold); border-bottom: 1px solid var(--gold); }
        .tab-content { display: none; text-align: left; animation: fadeIn 1s; }
        .tab-content.active { display: block; }
        #babaji-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.15rem; line-height: 1.8; color: #eee; padding: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 10px 5px; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        td { padding: 12px 5px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); color: #ddd; font-size: 0.9rem; }
        .field-label { font-size: 0.7rem; letter-spacing: 2px; color: var(--dusty-rose); display: block; text-align: left; margin-bottom: 5px; font-style: normal; }
        .row { display: flex; gap: 10px; margin-bottom: 20px; }
        .row select { margin-bottom: 0; flex: 1; }
        .tradition-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .tradition-btn { flex: 1; padding: 12px; background: transparent; color: rgba(226,194,117,0.4); border: 1px solid rgba(212,175,55,0.2); cursor: pointer; font-family: 'Cinzel Decorative', serif; font-size: 0.6rem; letter-spacing: 1px; }
        .tradition-btn.active { color: var(--gold); border-color: var(--gold); background: rgba(212,175,55,0.05); }
        #audio-player { width: 100%; margin-top: 20px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="cosmic-box">
        <h1>ASK BABAJI</h1>
        <span class="precision-tag">VINTAGE COSMOLOGY • GROUNDED INSIGHT</span>

        <span class="field-label">CHOOSE YOUR TRADITION</span>
        <div class="tradition-selector">
            <button class="tradition-btn active" onclick="selectTradition('western', this)">WESTERN</button>
            <button class="tradition-btn" onclick="selectTradition('indian', this)">INDIAN</button>
            <button class="tradition-btn" onclick="selectTradition('chinese', this)">CHINESE</button>
        </div>
        
        <input type="text" id="name" placeholder="Seeker's Name">

        <span class="field-label">DATE OF BIRTH</span>
        <div class="row">
            <select id="dob-month">
                <option value="">Month</option>
                <option value="01">January</option>
                <option value="02">February</option>
                <option value="03">March</option>
                <option value="04">April</option>
                <option value="05">May</option>
                <option value="06">June</option>
                <option value="07">July</option>
                <option value="08">August</option>
                <option value="09">September</option>
                <option value="10">October</option>
                <option value="11">November</option>
                <option value="12">December</option>
            </select>
            <select id="dob-day"><option value="">Day</option></select>
            <select id="dob-year"><option value="">Year</option></select>
        </div>

        <span class="field-label">TIME OF ARRIVAL</span>
        <div class="row">
            <select id="tob-hour"><option value="">Hour</option></select>
            <select id="tob-min"><option value="">Min</option></select>
        </div>

        <input type="text" id="location" placeholder="City of Birth">
        
        <button onclick="getInsights()">SEEK COSMIC CREAMINESS</button>

        <div class="divider"></div>

        <div id="results-area" style="display:none;">
            <audio id="audio-player" controls></audio>
            
            <div class="tab-menu" style="margin-top:20px;">
                <div class="tab-link active" onclick="switchTab('narrative', this)">Narrative</div>
                <div class="tab-link" onclick="switchTab('technical', this)">Hardware</div>
                <div class="tab-link" onclick="switchTab('aspects', this)">Aspects</div>
            </div>

            <div id="narrative" class="tab-content active"><div id="babaji-text"></div></div>
            <div id="technical" class="tab-content">
                <table>
                    <thead><tr><th>Planet</th><th>Sign</th><th>Degree</th><th>House</th></tr></thead>
                    <tbody id="chart-body"></tbody>
                </table>
            </div>
            <div id="aspects" class="tab-content"><div id="aspect-list"></div></div>
        </div>
    </div>

    <script>
        let selectedTradition = 'western';

        function selectTradition(t, el) {
            selectedTradition = t;
            document.querySelectorAll('.tradition-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        const daySelect = document.getElementById('dob-day');
        for (let i = 1; i <= 31; i++) {
            const opt = document.createElement('option');
            opt.value = String(i).padStart(2, '0');
            opt.text = i;
            daySelect.appendChild(opt);
        }

        const yearSelect = document.getElementById('dob-year');
        for (let i = 2010; i >= 1900; i--) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.text = i;
            yearSelect.appendChild(opt);
        }

        const hourSelect = document.getElementById('tob-hour');
        for (let i = 0; i <= 23; i++) {
            const opt = document.createElement('option');
            opt.value = String(i).padStart(2, '0');
            opt.text = String(i).padStart(2, '0') + ':00';
            hourSelect.appendChild(opt);
        }

        const minSelect = document.getElementById('tob-min');
        for (let i = 0; i <= 55; i += 5) {
            const opt = document.createElement('option');
            opt.value = String(i).padStart(2, '0');
            opt.text = String(i).padStart(2, '0');
            minSelect.appendChild(opt);
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
        }

        async function getInsights() {
            const output = document.getElementById('babaji-text');
            document.getElementById('results-area').style.display = 'block';
            output.innerText = "Dredging the silt...";

            const payload = {
                name: document.getElementById('name').value,
                dob: `${document.getElementById('dob-year').value}-${document.getElementById('dob-month').value}-${document.getElementById('dob-day').value}`,
                tob: `${document.getElementById('tob-hour').value}:${document.getElementById('tob-min').value}`,
                loc: document.getElementById('location').value,
                tradition: selectedTradition
            };

            try {
                const res = await fetch('/api/babaji', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                output.innerText = data.reading;

                if (data.audio) {
                    const audioPlayer = document.getElementById('audio-player');
                    audioPlayer.src = 'data:audio/mp3;base64,' + data.audio;
                    audioPlayer.play();
                }

                const body = document.getElementById('chart-body');
                body.innerHTML = (data.planets || []).map(p =>
                    `<tr><td>${p.name}</td><td>${p.sign}</td><td>${parseFloat(p.normDegree).toFixed(2)}°</td><td>${p.house}</td></tr>`
                ).join('');

                document.getElementById('aspect-list').innerHTML = (data.aspects || []).map(a => 
                    `<div style="font-size:0.85rem; margin-bottom:8px; opacity:0.7;">⌬ ${a.p1} ${a.type} ${a.p2}</div>`
                ).join('');
            } catch (e) {
                output.innerText = "The stars are obscured.";
            }
        }
    </script>
</body>
</html>
